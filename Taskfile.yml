version: "3"

tasks:
  default:
    desc: List all available tasks
    cmds:
      - task -l

  lint:
    desc: Run all linting checks
    cmds:
      - task: lint:fix-unsafe
      - task: lint:ty

  lint:check:
    desc: Run ruff linter
    cmds:
      - uv run ruff check app

  lint:fix:
    desc: Run ruff linter with auto-fix
    cmds:
      - uv run ruff check --fix app

  lint:fix-unsafe:
    desc: Run ruff linter with unsafe auto-fixes
    cmds:
      - uv run ruff check --fix --unsafe-fixes app

  lint:format:
    desc: Run ruff formatter
    cmds:
      - uv run ruff format app

  lint:format:check:
    desc: Check ruff formatting without modifying files
    cmds:
      - uv run ruff format --check app

  lint:ty:
    desc: Run ty type checker
    cmds:
      - uv run ty check app

  fix:
    desc: Auto-fix lint issues, format code, and run type checker
    cmds:
      - task: lint:fix-unsafe
      - task: lint:format
      - task: lint:ty

  run:
    desc: Run streamlit app
    cmds:
      - uv run streamlit run app/app.py
