services:
  app:
    image: ghcr.io/sarthakmishra/spotify-playlist-sorter:latest
    ports:
      - "8501:8501"
    environment:
      - SPOTIPY_CLIENT_ID=${SPOTIPY_CLIENT_ID:-}
      - SPOTIPY_CLIENT_SECRET=${SPOTIPY_CLIENT_SECRET:-}
      - SPOTIPY_REDIRECT_URI=${SPOTIPY_REDIRECT_URI:-http://127.0.0.1:8501}
    restart: unless-stopped
